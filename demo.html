<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EvCal Demo</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 16px;
      color: #222;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .event {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .event-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 8px;
    }

    .event-title {
      font-size: 1.1rem;
      font-weight: bold;
    }

    .event-date {
      font-size: 0.85rem;
      color: #555;
      white-space: nowrap;
    }

    .event-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .tag {
      background: #e8f0fe;
      color: #1a56db;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .event-description {
      font-size: 0.9rem;
      color: #444;
      line-height: 1.6;
    }

    .event {
      cursor: pointer;
    }

    .event-details {
      display: none;
      margin-top: 10px;
    }

    .event.open .event-details {
      display: block;
    }

    .event-description p { margin: 0 0 8px; }
    .event-description p:last-child { margin-bottom: 0; }

    .followup {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #888;
    }

    .error {
      color: #c00;
      background: #fff0f0;
      border: 1px solid #fcc;
      border-radius: 6px;
      padding: 12px 16px;
    }

    .empty {
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>

<h1>EvCal Events</h1>
<p class="subtitle" id="subtitle"></p>
<div id="events"></div>

<script>
  // ── Query parameters — adapt as needed ─────────────────────────────────────
  const PARAMS = {
    start: '-0d',   // today  (relative: -30d, +0d; or absolute: 2025-01-01)
    end:   '+1y',   // 1 year from today
    tags:  '',      // tag filter: comma = OR, plus = AND (e.g. "music,sport+outdoor")
  };
  // ── API base URL ────────────────────────────────────────────────────────────
  const API_BASE = 'http://localhost/evcal-admin';
  // const API_BASE = '/evcal-admin';
  // ───────────────────────────────────────────────────────────────────────────

  function formatDate(isoString) {
    const d = new Date(isoString);
    const date = d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const time = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    return time === '00:00' ? date : `${date} ${time}`;
  }

  async function loadEvents() {
    const query = new URLSearchParams();
    if (PARAMS.start) query.set('start', PARAMS.start);
    if (PARAMS.end)   query.set('end',   PARAMS.end);
    if (PARAMS.tags)  query.set('tags',  PARAMS.tags);

    const url = `${API_BASE}/api/public/events?${query}`;

    document.getElementById('subtitle').textContent =
      `Fetching ${url}`;

    let events;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
      events = await res.json();
    } catch (err) {
      document.getElementById('events').innerHTML =
        `<div class="error">Failed to load events: ${err.message}</div>`;
      return;
    }

    document.getElementById('subtitle').textContent =
      `${events.length} event(s) · ${url}`;

    const container = document.getElementById('events');

    if (events.length === 0) {
      container.innerHTML = '<p class="empty">No events found for the given filters.</p>';
      return;
    }

    container.innerHTML = events.map(event => {
      const tags = event.tags.length
        ? `<div class="event-tags">${event.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>`
        : '';

      const description = event.description
        ? `<div class="event-description">${marked.parse(event.description)}</div>`
        : '';

      const followup = event.followup && event.followup.length
        ? `<div class="followup">Follow-up: ${event.followup.map(d => formatDate(d)).join(', ')}</div>`
        : '';

      return `
        <div class="event" onclick="this.classList.toggle('open')">
          <div class="event-header">
            <span class="event-title">${event.title}</span>
            <span class="event-date">${formatDate(event.start)}</span>
          </div>
          ${tags}
          <div class="event-details">
            ${description}
            ${followup}
          </div>
        </div>`;
    }).join('');
  }

  loadEvents();
</script>

</body>
</html>
