<mat-toolbar color="primary">
  <span>EvCal Admin</span>
  <span class="spacer"></span>
  <button mat-icon-button (click)="logout()" aria-label="Logout" title="Logout">
    <mat-icon>logout</mat-icon>
  </button>
</mat-toolbar>

<div class="content">
  <div class="actions-bar">
    <button mat-raised-button color="primary" (click)="openNewEventDialog()">
      <mat-icon>add</mat-icon> New Event
    </button>
  </div>

  @if (loading) {
    <div class="spinner-container">
      <mat-spinner />
    </div>
  } @else {
    <table mat-table [dataSource]="events" class="events-table mat-elevation-z2">

      <!-- Title Column -->
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Title</th>
        <td mat-cell *matCellDef="let event">{{ event.title }}</td>
      </ng-container>

      <!-- Start Column -->
      <ng-container matColumnDef="start">
        <th mat-header-cell *matHeaderCellDef>First Date</th>
        <td mat-cell *matCellDef="let event">
          {{ event.start[0] ?? '—' }}
        </td>
      </ng-container>

      <!-- Fups Column -->
      <ng-container matColumnDef="fups">
        <th mat-header-cell *matHeaderCellDef>Fups</th>
        <td mat-cell *matCellDef="let event">{{ event.start.length - 1 || '—' }}</td>
      </ng-container>

      <!-- Tags Column -->
      <ng-container matColumnDef="tags">
        <th mat-header-cell *matHeaderCellDef>Tags</th>
        <td mat-cell *matCellDef="let event">
          <mat-chip-set>
            @for (tag of event.tags; track tag) {
              <mat-chip>{{ tag }}</mat-chip>
            }
          </mat-chip-set>
        </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let event">
          <button
            mat-icon-button
            color="primary"
            (click)="openEditDialog(event)"
            aria-label="Edit event"
            title="Edit"
          >
            <mat-icon>edit</mat-icon>
          </button>
          <button
            mat-icon-button
            color="warn"
            (click)="deleteEvent(event)"
            aria-label="Delete event"
            title="Delete"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>

      <!-- No-data row -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data-cell" [attr.colspan]="displayedColumns.length">
          No events found.
        </td>
      </tr>
    </table>
  }
</div>
